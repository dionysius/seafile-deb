# seaf-server and fileserver configuration.
# Reference: https://manual.seafile.com/13.0/config/seafile-conf/
# Secrets and database/cache connection settings live in seafile.env (loaded as
# environment variables), not here.

[database]
# Connection details come from seafile.env (SEAFILE_MYSQL_DB_*); mysql is the
# only supported backend.
type = mysql
# Connection pool size of seaf-server (the go fileserver uses a fixed pool of 8).
#max_connections = 100

[fileserver]
# The file server listens here (the go fileserver by default, see
# ENABLE_GO_FILESERVER in seafile.env); clients reach it through the reverse
# proxy's /seafhttp route.
host = 127.0.0.1
port = 8082
# Maximum upload size per file in MB (unset = unlimited).
#max_upload_size =
# Maximum size a folder can have to be downloadable as zip, in MB.
#max_download_dir_size = 100
# Validity of web access tokens in seconds (the go fileserver defaults to 7200).
#web_token_expire_time = 3600
# Number of goroutines/threads indexing uploaded files.
#max_indexing_threads = 1
# Block size uploaded files are split into, in MB.
#fixed_block_size = 8
# Verify blocks after a client sync upload.
#verify_client_blocks_after_sync = true
# Log level of the go fileserver (debug, info, warn, error).
#go_log_level = info
# Memory limit for the go fileserver's fs-object cache, in MB.
#fs_cache_limit = 4096
# Timeout for fs id list requests in seconds (-1 = none; go fileserver).
#fs_id_list_request_timeout = -1
# Worker threads (built-in fileserver only).
#worker_threads = 10
# Threads processing indexed uploads (built-in fileserver only).
#max_index_processing_threads = 3

[quota]
# Default per-user quota (unset = unlimited). The value is in GB, or takes a
# unit suffix: kb, mb, gb, tb.
#default = 2
# Include shared libraries in a user's usage.
#calc_share_usage = false

[history]
# Days of per-library file history kept (-1 = full history).
#keep_days = -1

[library_trash]
# Days until deleted libraries expire from the trash.
#expire_days = 30
# Interval for the trash expiry scan, in days.
#scan_days = 1

### Other options ###
#[general]
# Multi-tenant cloud mode.
#cloud_mode = false

#[fileserver]
# Permission mode of shared temp files in a cluster.
#cluster_shared_temp_file_mode = 0600
# Lifetime and scan interval of temporary upload files in a cluster, in seconds
# (built-in fileserver only).
#http_temp_file_ttl = 259200
#http_temp_scan_interval = 3600
# Expose go pprof profiling, guarded by a password (go fileserver only).
#enable_profiling = false
#profile_password =

# seaf-server configuration. Reference: https://manual.seafile.com/13.0/config/seafile-conf/
# Secrets and database/cache connection settings live in seafile.env (loaded as
# environment variables), not here.

[database]
# Connection details come from seafile.env (SEAFILE_MYSQL_DB_*). Keep this block
# despite upstream marking it obsolete: seaf-server reads it when deciding whether
# to leave the file server port to the go fileserver.
type = mysql

[fileserver]
# The go fileserver (ENABLE_GO_FILESERVER in seafile.env) listens here; put a
# reverse proxy (nginx) in front for TLS and to serve seahub on the same host.
host = 127.0.0.1
port = 8082

# Real-time notification server (see ENABLE_NOTIFICATION_SERVER in seafile.env).
#[notification]
#enabled = true
#host = 127.0.0.1
#port = 8083

[quota]
# Default per-user quota in GB (0 = unlimited).
default = 0

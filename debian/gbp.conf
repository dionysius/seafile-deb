# clone debian source:      gbp clone $PKG_GIT_URL
# update debian source:     gbp pull
# track upstream source:    git remote add upstream $UPSTREAM_GIT_URL
# check new upstream:       uscan --report
# fetch upstream vcs tags:  git fetch upstream --tags
# pre-place frozen libs:    VER=13.0.25  # the upstream version being imported (see uscan --report)
#                           wget -O ../seafile-server_$VER.orig-libsearpc.tar.gz https://github.com/haiwen/libsearpc/archive/refs/tags/v3.3-latest.tar.gz
#                           wget -O ../seafile-server_$VER.orig-libevhtp.tar.gz  https://github.com/haiwen/libevhtp/archive/refs/tags/1.1.6.tar.gz
# import upstream source:   gbp import-orig --uscan
# update package version:   gbp dch -c -D unstable -R
# publish source release:   gbp tag && gbp push
# build package:            gbp buildpackage
#
# libsearpc and libevhtp are frozen build components on their own version streams
# (3.x, 1.x), always lower than the main version (13.x). uscan compares every
# component against the main version and skips anything "not newer", so it cannot
# track them - they are pre-placed by hand (above) and imported alongside the uscan
# tarballs. Bump their pinned tags there when upstream's build script changes them.

[DEFAULT]
debian-branch = main
debian-tag = debian/%(version)s
upstream-branch = upstream
upstream-tag = upstream/%(version)s

[buildpackage]
overlay = True
export-dir = ..

[import-orig]
merge = False
# strip upstream's own CI configs on import: their workflows are on:[push] and would fire
# (and fail) on every push of this repo's upstream branch.
filter = .github
# main tarball tracks seafile-server's vX.Y.Z-server tag; every other repo is
# imported as an additional upstream component (its own tarball) unpacked into a
# directory named after the component. seahub/seafobj/seafdav/seafevents come from
# uscan (debian/watch); libsearpc/libevhtp are pre-placed by hand (see above).
# The list must be a python-literal list (gbp splits it that way, not on spaces).
upstream-vcs-tag = v%(version)s-server
component = ["libevhtp", "libsearpc", "seahub", "seafobj", "seafdav", "seafevents"]
